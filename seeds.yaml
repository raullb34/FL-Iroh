# seeds.yaml — reproducibility seed registry
# All experiments read their seeds from here.
# NOTE: changing these invalidates all published results.

data_partition: 42         # Dirichlet partition seed
model_init:     123        # torch.manual_seed before model instantiation
churn_simulator: 456       # churn_simulator.py random choices
experiment_e1:  789        # E1 microbenchmark — iteration ordering
experiment_e2:  101        # E2 centralized FL run
experiment_e3:  202        # E3 NAT traversal
experiment_e5:  303        # E5 churn resilience
experiment_e6:  404        # E6 CoAP overhead
experiment_e7:  505        # E7 air quality FL (AirMLP + FedAvg, ProphetWrapper + FedGAM)

# --- Multi-seed replication (F2: confidence intervals + significance tests) ---
# Master seeds for replicated runs. Experiments that support --seeds derive
# their per-replicate (data_partition, model_init, experiment_e*) seeds
# deterministically from each master via experiments._replication.derive_seeds.
# Five replicates give a usable t-based CI95 while staying affordable on HPC.
# The first entry (505) reproduces the canonical single-seed results above.
replicate_seeds: [505, 1009, 2017, 3023, 4099]
